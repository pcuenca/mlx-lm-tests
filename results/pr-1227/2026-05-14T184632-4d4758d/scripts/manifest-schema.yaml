# Test Manifest Schema for MLX Model Conversion PRs
#
# Generated by the transformers-to-mlx skill at PR submission time.
# Stored in the test manifests repo, not in the PR itself.
#
# The test harness reads this file to know what to test. It runs a fixed
# battery of tests per variant; the manifest specifies *what* to test,
# not *how*.

# --- Schema version (required) ---
# Bump when the format changes in a backwards-incompatible way.
version: 1

# --- PR metadata (required) ---
pr:
  number: 42
  repo: pcuenca/mlx-lm
  branch: add-olmo-hybrid

# --- Model info (required) ---
# Python module name in mlx_lm/models/
model_type: olmo_hybrid

# --- Variants to test (required, at least one) ---
# Each variant is a HuggingFace model that exercises the implementation.
variants:
  - repo_id: allenai/Olmo-Hybrid-7B
    # "base" = completion model (use continuation prompts)
    # "instruct" = chat model (use chat template)
    type: base
    # Estimated memory in GB for the unquantized model.
    # Used to decide single-machine vs distributed execution.
    #   <= 400 GB: single machine (512 GB with headroom)
    #   <= 800 GB: 2 machines
    #   <= 1200 GB: 3 machines
    memory_gb: 16
    # Expected output dtype. Read from config by the skill.
    # The harness verifies both forward-pass output and norm weight dtypes.
    expected_dtype: bfloat16

  - repo_id: allenai/Olmo-Hybrid-Instruct-DPO-7B
    type: instruct
    memory_gb: 16
    expected_dtype: bfloat16

# --- Quantization (optional, default: true) ---
# Set to false if the model uses native quantization (e.g., mxfp4)
# and the standard quantize-then-test flow doesn't apply.
quantize: true

# --- Trust remote code (optional, default: false) ---
# Set to true if the model is not yet upstream in transformers and only loads
# via `trust_remote_code=True` (custom modeling/config files in the HF repo).
# When true, the harness:
#   - Passes --trust-remote-code to mlx_lm.generate / mlx_lm.convert.
#   - Passes --trust-remote-code to compare_predictions.py / compare_layers.py
#     so AutoModelForCausalLM and AutoTokenizer can resolve the custom code.
# Has no effect on the MLX side (mlx-lm uses its own native modeling code).
trust_remote_code: false

# --- Reference forward pass (optional) ---
# Used by generate_reference_script.py to build a per-PR copy of
# compute_reference.py for HF Jobs. Only relevant when the model's reference
# implementation needs deps that don't run on Apple Silicon (e.g.
# trust_remote_code models with CUDA-only kernels like fla, mamba_ssm).

# Pin for `transformers` in the reference job. Should match the value in the
# model's config.json["transformers_version"] — that's the API the custom
# modeling file was written against.
transformers_version: 4.56.2

# Extra pip dependencies the custom modeling code requires. Use PyPI
# distribution names, not import names (e.g. "flash-linear-attention",
# not "fla"). Version pins are recommended for reproducibility.
extra_pip:
  - flash-linear-attention>=0.5.0

# --- Notes (optional) ---
# Free-form context for the human reviewer. Highlights anything unusual
# about this conversion that the fixed test battery may not fully cover.
notes: >
  DPO variant uses NoPE (rope_theta: null) while base/SFT use standard
  RoPE with theta=10000. The numerical comparison should catch any
  RoPE misconfiguration, but worth eyeballing the long sequence output
  for the DPO variant specifically.
